name: Laravel Pro CI/CD

on:
  push:
    branches: [ "main" ]

# حل مشكلة تحذير Node.js 20/24 لضمان عمل الـ Pipeline حتى نهاية 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # المرحلة الأولى: بناء البيئة والتأكد من جودة الكود (CI)
  tests-and-build:
    runs-on: ubuntu-latest
    
    services:
      # إنشاء قاعدة بيانات مؤقتة للاختبارات فقط
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3' # يتوافق مع Laravel 13
        extensions: mbstring, bcmath, gd, mysql, zip
        tools: composer:v2

    - name: Install Composer Dependencies
      # ملاحظة: هذا الأمر سيفشل إذا لم ترفع ملف composer.lock المحدث محلياً
      run: composer install --prefer-dist --no-interaction --optimize-autoloader

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm install
        npm run build # بناء ملفات Vite

    - name: Prepare Laravel Environment
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Run Database Migrations (On Testing DB)
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: testing_db
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan migrate --force

    - name: Execute Tests (PHPUnit)
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: testing_db
        DB_USERNAME: root
        DB_PASSWORD: password
      run: vendor/bin/phpunit --display-failed

  # المرحلة الثانية: النشر إلى السيرفر الفعلي (CD)
  deploy:
    needs: tests-and-build # لن يبدأ النشر إلا إذا نجحت الاختبارات أعلاه
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/moustafa/app.alshafhy.com
          git pull origin main
          
          # تحديث المكتبات على السيرفر (بدون مكتبات التطوير)
          composer install --no-dev --no-interaction --optimize-autoloader
          
          # تحديث قاعدة البيانات الفعلية
          php artisan migrate --force
          
          # تنظيف وتحسين الكاش لزيادة سرعة الموقع
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # بناء ملفات الـ Frontend على السيرفر
          npm install
          npm run build
          
          # إعادة تشغيل الـ Queue إذا كنت تستخدمه
          # php artisan queue:restart